<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, follow" />
  <title>Unsubscribe — IgnorAInt</title>
  <link rel="icon" href="/assets/mark.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .unsub-wrap { max-width: 560px; margin: 120px auto; padding: 48px; background: var(--paper-tint); border: 1px solid var(--border-1); border-radius: 24px; text-align: center; }
    .unsub-wrap h1 { font-size: 36px; font-weight: 400; margin: 0 0 12px; }
    .unsub-wrap p { color: var(--ink-soft); font-size: 16px; line-height: 1.6; margin: 0 0 20px; }
    .unsub-wrap .status { margin: 24px 0; padding: 16px 20px; border-radius: 12px; font-size: 15px; }
    .unsub-wrap .status.success { background: rgba(79,107,74,0.12); color: var(--leaf); }
    .unsub-wrap .status.error { background: rgba(176,65,62,0.12); color: var(--danger); }
    @media (max-width: 600px) { .unsub-wrap { margin: 40px 20px; padding: 32px 24px; } }
  </style>
</head>
<body>

  <div class="unsub-wrap">
    <h1 id="title">One moment…</h1>
    <p id="subtitle">Processing your unsubscribe request.</p>
    <div id="status" class="status hidden"></div>
    <p style="margin-top:32px;font-size:13px;"><a href="/">← Back to ignorAInt.com</a></p>
  </div>

  <script type="module" src="config.js"></script>
  <script type="module">
    const cfg = window.CRM_CONFIG || {};
    const params = new URLSearchParams(location.search);
    const contactId = params.get("c");
    const token     = params.get("t");
    const title     = document.getElementById("title");
    const subtitle  = document.getElementById("subtitle");
    const status    = document.getElementById("status");

    function show(ok, msg) {
      title.textContent   = ok ? "You're unsubscribed." : "We couldn't process that link.";
      subtitle.textContent = ok
        ? "You won't receive further emails from ignorAInt."
        : "The link may have expired or been used already.";
      status.textContent  = msg;
      status.className    = "status " + (ok ? "success" : "error");
      status.classList.remove("hidden");
    }

    (async () => {
      if (!contactId || !token) { show(false, "Missing unsubscribe token."); return; }
      if (!cfg.SUPABASE_URL || cfg.SUPABASE_URL.startsWith("PASTE")) { show(false, "CRM config missing — see SETUP.md"); return; }
      try {
        const res = await fetch(`${cfg.SUPABASE_URL}/functions/v1/unsubscribe`, {
          method: "POST",
          headers: { "content-type": "application/json", "apikey": cfg.SUPABASE_ANON_KEY },
          body: JSON.stringify({ contact_id: contactId, token }),
        });
        const data = await res.json();
        if (!res.ok) { show(false, data.error || `HTTP ${res.status}`); return; }
        show(true, "Your preference has been saved.");
      } catch (e) {
        show(false, e.message || "Network error.");
      }
    })();
  </script>
</body>
</html>
